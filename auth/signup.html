<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --space-indigo: #22223b;
            --dusty-grape: #4a4e69;
            --lilac-ash: #9a8c98;
            --almond-silk: #c9ada7;
            --parchment: #f2e9e4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            background: var(--space-indigo);
        }

        /* LEFT PANEL */
        .left {
            flex: 1;
            background: linear-gradient(135deg, var(--dusty-grape), var(--space-indigo));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 40px;
        }

        .left h1 {
            font-size: 32px;
            max-width: 300px;
            line-height: 1.3;
        }

        /* RIGHT PANEL */
        .right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--parchment);
        }

        .card {
            width: 320px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            margin-bottom: 15px;
            color: var(--space-indigo);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid var(--lilac-ash);
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: var(--almond-silk);
            color: var(--space-indigo);
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: var(--lilac-ash);
        }

        .link {
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
        }

        .link a {
            color: var(--dusty-grape);
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="left">
        <h1>Your thoughts, organized beautifully.</h1>
    </div>

    <div class="right">
        <div class="card">
            <h2 style="text-align: center;">Sign Up</h2>

            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">

            <button id="loginBtn">Create Account</button>

            <div class="link">
                Have an account?
                <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { signup } from "../js/auth.js";
        
        document.getElementById("loginBtn").onclick = async () => {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
        
            try {
                await signup(email, password);
                alert("Account created!");
                window.location.href = "login.html";
            } catch (err) {
                alert(err.message);
            }
        };
    </script>

</body>

</html>
